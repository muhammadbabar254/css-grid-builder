<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Builder</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>📐 CSS Grid Builder</h1>
        <p>Create grid layouts visually & copy CSS instantly</p>

        <div class="controls">

            <label>Columns</label>
            <input type="number" id="cols" value="3" min="1" max="12">

            <label>Rows</label>
            <input type="number" id="rows" value="3" min="1" max="12">

            <button id="generateBtn">Generate Grid</button>
            <button id="copyBtn">Copy CSS</button>

        </div>

        <div class="grid" id="grid"></div>

        <textarea id="output" readonly></textarea>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
